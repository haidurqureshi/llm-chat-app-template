<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Haidur's Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0b;
      --surface:   #0f0f11;
      --surface2:  #161618;
      --border:    #1e1e22;
      --border2:   #252528;
      --text:      #f0f0ee;
      --muted:     #9a9a96;
      --faint:     #484848;
      --accent:    #c8ff5e;
      --accent2:   #6fdfb8;
      --user-text: #0a0a0b;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Layout ── */
    .shell {
      width: 100%;
      max-width: 480px;
      height: min(680px, 90dvh);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 0 1px #ffffff06;
    }

    /* ── Header ── */
    .header {
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, var(--accent), var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: var(--user-text);
      flex-shrink: 0;
    }
    .header-meta .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .header-meta .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      margin-top: 1px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeup 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes fadeup { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, var(--accent), var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 9px;
      color: var(--user-text);
      flex-shrink: 0;
    }

    .bubble {
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.6;
      max-width: 80%;
      word-break: break-word;
    }
    .bubble.bot {
      background: var(--surface2);
      color: #d8d8d5;
      border: 0.5px solid var(--border2);
      border-radius: 4px 14px 14px 14px;
    }
    .bubble.user {
      background: var(--accent);
      color: var(--user-text);
      font-weight: 500;
      border-radius: 14px 14px 4px 14px;
    }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .typing span {
      width: 6px; height: 6px; background: var(--faint);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

    /* ── Quick chips ── */
    .chips {
      padding: 4px 20px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }
    .chip {
      background: #141416;
      border: 0.5px solid var(--border2);
      color: var(--muted);
      font-size: 11.5px;
      font-family: 'DM Mono', monospace;
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input row ── */
    .input-row {
      padding: 14px 20px;
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .input-row input {
      flex: 1;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      color: var(--text);
      font-size: 13.5px;
      font-family: 'Syne', sans-serif;
      padding: 10px 14px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input::placeholder { color: var(--faint); }
    .input-row input:focus { border-color: #c8ff5e44; }
    .send {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s, opacity 0.15s;
    }
    .send:hover { transform: scale(1.08); }
    .send:disabled { opacity: 0.35; cursor: default; transform: none; }
    .send svg { width: 15px; height: 15px; }
  </style>
</head>
<body>

<div class="shell" role="main">
  <!-- Header -->
  <div class="header">
    <div class="avatar" aria-hidden="true">J</div><!-- ✏️ Change letter to your initial -->
    <div class="header-meta">
      <div class="name">Jamie's Assistant</div><!-- ✏️ Your name -->
      <div class="status"><span class="dot"></span> Online now</div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages" aria-live="polite" aria-label="Chat messages">
    <div class="msg">
      <div class="msg-avatar" aria-hidden="true">J</div>
      <div class="bubble bot">
        Hey! I'm here to help you learn about Jamie's work and services. What would you like to know?
      </div><!-- ✏️ Customise opening message -->
    </div>
  </div>

  <!-- Quick-reply chips -->
  <div class="chips" id="chips">
    <button class="chip" onclick="sendChip(this)">→ What do you do?</button>
    <button class="chip" onclick="sendChip(this)">→ Availability</button>
    <button class="chip" onclick="sendChip(this)">→ Pricing</button>
    <button class="chip" onclick="sendChip(this)">→ Get in touch</button>
  </div><!-- ✏️ Edit chips to match your most common questions -->

  <!-- Input -->
  <div class="input-row">
    <input
      type="text"
      id="userInput"
      placeholder="Ask me anything…"
      aria-label="Type a message"
      autocomplete="off"
    />
    <button class="send" id="sendBtn" aria-label="Send message" onclick="sendMessage()">
      <svg viewBox="0 0 20 20" fill="none" stroke="#0a0a0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="4" y1="10" x2="16" y2="10"/>
        <polyline points="11,5 16,10 11,15"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('userInput');
  const sendBtn    = document.getElementById('sendBtn');
  const chipsEl    = document.getElementById('chips');

  // Full conversation history sent to the Worker each turn
  const history = [];

  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

  function sendChip(btn) {
    const text = btn.textContent.replace('→ ', '').trim();
    // Hide chips after first use to keep the UI clean
    chipsEl.style.display = 'none';
    sendMessage(text);
  }

  async function sendMessage(override) {
    const text = (override ?? inputEl.value).trim();
    if (!text) return;

    inputEl.value = '';
    setDisabled(true);

    // User bubble
    appendBubble('user', text);
    history.push({ role: 'user', content: text });
    scrollBottom();

    // Typing indicator
    const typingEl = appendTyping();
    scrollBottom();

    // Stream response
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok || !res.body) throw new Error('Bad response');

      typingEl.remove();
      const botBubble = appendBubble('bot', '');
      scrollBottom();

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   full    = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            const token = json?.response ?? '';
            full += token;
            botBubble.textContent = full;
            scrollBottom();
          } catch { /* skip non-JSON lines */ }
        }
      }

      if (!full) botBubble.textContent = "Sorry, I couldn't get a response. Try again!";
      history.push({ role: 'assistant', content: full });

    } catch (err) {
      typingEl?.remove();
      appendBubble('bot', "Something went wrong — please try again.");
      console.error(err);
    }

    setDisabled(false);
    inputEl.focus();
  }

  function appendBubble(role, text) {
    const row    = document.createElement('div');
    row.className = `msg ${role}`;

    if (role === 'bot') {
      const av = document.createElement('div');
      av.className = 'msg-avatar'; av.setAttribute('aria-hidden', 'true'); av.textContent = 'J';
      row.appendChild(av);
    }

    const b = document.createElement('div');
    b.className = `bubble ${role}`;
    b.textContent = text;
    row.appendChild(b);
    messagesEl.appendChild(row);
    return b;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.setAttribute('aria-hidden', 'true'); av.textContent = 'J';
    const b = document.createElement('div');
    b.className = 'bubble bot';
    b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(av); row.appendChild(b);
    messagesEl.appendChild(row);
    return row;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setDisabled(val) {
    sendBtn.disabled = val;
    inputEl.disabled = val;
  }
</script>
</body>
</html>
